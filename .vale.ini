# Vale configuration for Grupo Alista website
# https://vale.sh/docs/topics/config/

StylesPath = .vale/styles
MinAlertLevel = warning

# File-specific settings
[*.html]
# Disable spelling for Spanish content
BasedOnStyles = Vale
Vale.Spelling = NO
# Skip code blocks and script tags
BlockIgnores = (?s)(<script.*?>.*?</script>|<style.*?>.*?</style>|<code.*?>.*?</code>)
# Skip HTML attributes
TokenIgnores = (<[^>]+>)

[*.md]
BasedOnStyles = Vale
Vale.Spelling = NO
