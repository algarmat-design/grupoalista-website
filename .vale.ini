# Vale configuration for Grupo Alista website
# https://vale.sh/docs/topics/config/

StylesPath = .vale/styles
MinAlertLevel = suggestion

# Vocab defines custom terminology
Vocab = GrupoAlista

# File-specific settings
[*.html]
BasedOnStyles = Vale, write-good, proselint
# Skip code blocks and script tags
BlockIgnores = (?s)(<script.*?>.*?</script>|<style.*?>.*?</style>|<code.*?>.*?</code>)
# Skip HTML attributes
TokenIgnores = (<[^>]+>)

[*.md]
BasedOnStyles = Vale, write-good, proselint

# Rules customization
# Disable some rules that conflict with marketing copy
Vale.Spelling = NO
write-good.Passive = suggestion
write-good.Weasel = suggestion
write-good.TooWordy = suggestion
proselint.Cliches = warning
proselint.Hyperbole = suggestion
