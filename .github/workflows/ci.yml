name: CI - Lint & Validate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # SECURITY SCANNING
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pin to latest stable release (Mar 2026)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # LINTING
  # ===========================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Non-blocking during initial rollout - will be made blocking once codebase is fully compliant
      - name: Run HTMLHint
        run: npm run lint:html
        continue-on-error: true

      # Non-blocking during initial rollout - will be made blocking once codebase is fully compliant
      - name: Run Stylelint
        run: npm run lint:css
        continue-on-error: true

      # Non-blocking during initial rollout - will be made blocking once codebase is fully compliant
      - name: Run ESLint
        run: npm run lint:js
        continue-on-error: true

      - name: Check formatting with Prettier
        run: npm run format:check

  # ===========================================================================
  # PROSE/TEXT VALIDATION WITH VALE
  # ===========================================================================
  prose:
    name: Validate Prose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Vale Linter
        uses: errata-ai/vale-action@v2
        with:
          files: '["index.html", "README.md"]'
          fail_on_error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # ACCESSIBILITY CHECK
  # ===========================================================================
  accessibility:
    name: Accessibility Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create screenshots directory
        run: mkdir -p pa11y-screenshots

      - name: Run pa11y accessibility check
        run: npx pa11y-ci --config .pa11yci.json
        continue-on-error: true

  # ===========================================================================
  # HTML VALIDATION
  # ===========================================================================
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML with W3C
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          blacklist: 'node_modules'

  # ===========================================================================
  # LINK CHECK
  # ===========================================================================
  links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress '*.html' '**/*.html'
          fail: false
