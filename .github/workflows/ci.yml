name: CI - Lint & Validate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # SECURITY SCANNING
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # LINTING
  # ===========================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run HTMLHint
        run: npm run lint:html
        continue-on-error: true

      - name: Run Stylelint
        run: npm run lint:css
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint:js
        continue-on-error: true

      - name: Check formatting with Prettier
        run: npm run format:check

  # ===========================================================================
  # PROSE/TEXT VALIDATION WITH VALE
  # ===========================================================================
  prose:
    name: Validate Prose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vale
        run: |
          wget -q https://github.com/errata-ai/vale/releases/download/v2.30.0/vale_2.30.0_Linux_64-bit.tar.gz
          tar -xzf vale_2.30.0_Linux_64-bit.tar.gz
          sudo mv vale /usr/local/bin/

      - name: Download Vale styles
        run: |
          mkdir -p .vale/styles
          cd .vale/styles
          wget -q https://github.com/errata-ai/write-good/releases/download/v1.0.0/write-good.zip
          unzip -q write-good.zip
          wget -q https://github.com/errata-ai/proselint/releases/download/v0.3.3/proselint.zip
          unzip -q proselint.zip

      - name: Run Vale
        run: vale --config .vale.ini --output=line . || true

  # ===========================================================================
  # ACCESSIBILITY CHECK
  # ===========================================================================
  accessibility:
    name: Accessibility Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pa11y accessibility check
        run: |
          npx pa11y-ci --config .pa11yci.json || true
        continue-on-error: true

  # ===========================================================================
  # HTML VALIDATION
  # ===========================================================================
  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML with W3C
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          blacklist: 'node_modules'

  # ===========================================================================
  # LINK CHECK
  # ===========================================================================
  links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress '*.html' '**/*.html'
          fail: false
