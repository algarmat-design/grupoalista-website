name: Deploy to AWS S3 & CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # VALIDATE BEFORE DEPLOY
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Security scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # DEPLOY TO AWS
  # ===========================================================================
  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::383941187944:role/GitHubActions-grupoalista-website
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://grupoalista.com \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".vale/*" \
            --exclude "node_modules/*" \
            --exclude ".gitignore" \
            --exclude ".editorconfig" \
            --exclude ".eslintrc.json" \
            --exclude ".htmlhintrc" \
            --exclude ".prettierrc" \
            --exclude ".prettierignore" \
            --exclude ".stylelintrc.json" \
            --exclude ".vale.ini" \
            --exclude ".secrets.baseline" \
            --exclude ".gitleaks.toml" \
            --exclude ".pa11yci.json" \
            --exclude ".pre-commit-config.yaml" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "LICENSE" \
            --exclude "README.md" \
            --exclude "SECURITY.md" \
            --delete

      - name: Set content types
        run: |
          aws s3 cp s3://grupoalista.com/index.html s3://grupoalista.com/index.html \
            --content-type "text/html; charset=utf-8" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3T7225AX2D04Y \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket:** grupoalista.com" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront:** d56we46klj9j0.cloudfront.net" >> $GITHUB_STEP_SUMMARY
          echo "- **Website:** https://www.grupoalista.com" >> $GITHUB_STEP_SUMMARY
