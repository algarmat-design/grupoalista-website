name: Deploy to AWS S3 & CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::383941187944:role/GitHubActions-grupoalista-website
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://grupoalista.com \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude ".editorconfig" \
            --exclude "LICENSE" \
            --exclude "README.md" \
            --exclude "SECURITY.md" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3T7225AX2D04Y \
            --paths "/*"
